<section>
    {{ range .Site.Data.bio }}
    <details>
        <summary class="text-center text-error">{{ .name }} Link-in-Bio</summary>
        <div class="bio-gallery">
            {{ range .items }}
            {{ if $.ratio }}
            <div class="bio-item" style="aspect-ratio: 9/16;">
                <a href="{{ .url }}" target="_blank" aria-label="{{ $.name }} link-in-bio">
                    <img class="bio-img text-center" src="{{ .image }}" width="100%" height="100%"
                        alt="{{ $.name }} post"></a>
            </div>
            {{ else }}
            <div class="bio-item">
                <a href="{{ .url }}" target="_blank" aria-label="{{ $.name }} link-in-bio">
                    <img class="bio-img text-center" src="{{ .image }}" width="100%" height="100%"
                        alt="{{ $.name }} post"></a>
            </div>
            {{ end }}
            {{ end }}
        </div>
    </details>
    {{ end }}
</section>
